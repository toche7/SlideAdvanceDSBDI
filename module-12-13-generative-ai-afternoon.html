<h2 id="%E0%B8%A7%E0%B8%B1%E0%B8%95%E0%B8%96%E0%B8%B8%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%AA%E0%B8%87%E0%B8%84%E0%B9%8C%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%A3%E0%B8%B9%E0%B9%89">วัตถุประสงค์การเรียนรู้</h2>

<li><strong>ใช้ LLM กับงาน extraction, validation, summarization</strong> ได้ในระดับเริ่มต้น</li>
<li><strong>เข้าใจภาพรวมของ chatbot, embeddings, RAG</strong> และ vector database</li>
<li><strong>ออกแบบ prompt สำหรับงานข้อมูลจริง</strong> พร้อมจุดที่ต้องตรวจโดยมนุษย์</li>

<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="5" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="generative-ai-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Generative AI คืออะไร</h2>
<h3 id="%E0%B8%84%E0%B8%B3%E0%B8%AD%E0%B8%98%E0%B8%B4%E0%B8%9A%E0%B8%B2%E0%B8%A2%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B8%AA%E0%B8%B1%E0%B9%89%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%AA%E0%B8%B8%E0%B8%94">คำอธิบายแบบสั้นที่สุด</h3>
<ul>
<li>เป็นกลุ่มของ AI ที่ <strong>สร้างเนื้อหาใหม่</strong> จาก pattern ที่เรียนรู้มา</li>
<li>เนื้อหาที่สร้างได้อาจเป็น <strong>ข้อความ, รูปภาพ, เสียง, โค้ด, วิดีโอ</strong></li>
<li>คำว่า &quot;generate&quot; ไม่ได้แปลว่าคิดเองจากศูนย์ แต่คือสร้าง output ใหม่จากสิ่งที่เคยเรียนรู้</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%9E%E0%B8%9A%E0%B9%84%E0%B8%94%E0%B9%89%E0%B8%9A%E0%B9%88%E0%B8%AD%E0%B8%A2">ตัวอย่างที่พบได้บ่อย</h3>
<ul>
<li>สร้างอีเมลหรือสรุปรายงาน</li>
<li>สร้างรูปภาพจาก prompt</li>
<li>สร้างโค้ด Python หรือ SQL</li>
<li>สร้างข้อความจำลองสำหรับทดสอบระบบ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="6" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B9%81%E0%B8%A5%E0%B9%89%E0%B8%A7-llm-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">แล้ว LLM คืออะไร</h2>
<h3 id="%E0%B8%84%E0%B8%A7%E0%B8%B2%E0%B8%A1%E0%B8%AA%E0%B8%B1%E0%B8%A1%E0%B8%9E%E0%B8%B1%E0%B8%99%E0%B8%98%E0%B9%8C%E0%B8%81%E0%B8%B1%E0%B8%9A-generative-ai">ความสัมพันธ์กับ Generative AI</h3>
<ul>
<li><strong>LLM = Large Language Model</strong></li>
<li>LLM เป็น <strong>หนึ่งประเภทของ Generative AI</strong> ที่เชี่ยวชาญเรื่องภาษา</li>
<li>ถ้า Generative AI เป็น &quot;หมวดใหญ่&quot; LLM คือ &quot;เครื่องมือย่อย&quot; ที่ใช้สร้างและเข้าใจข้อความ</li>
</ul>
<h3 id="%E0%B9%80%E0%B8%9B%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%9A%E0%B9%80%E0%B8%97%E0%B8%B5%E0%B8%A2%E0%B8%9A%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B8%87%E0%B9%88%E0%B8%B2%E0%B8%A2">เปรียบเทียบแบบง่าย</h3>
<ul>
<li><strong>Generative AI</strong>: คำรวมของระบบที่สร้าง content ใหม่</li>
<li><strong>LLM</strong>: โมเดลที่สร้างและประมวลผล &quot;ภาษา&quot; เป็นหลัก</li>
</ul>
<blockquote>
<p>สรุปสั้น: ทุก LLM เป็น Generative AI แต่ไม่ใช่ทุก Generative AI จะเป็น LLM</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="7" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B9%80%E0%B8%AB%E0%B9%87%E0%B8%99%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B8%8A%E0%B8%B1%E0%B8%94">ตัวอย่างให้เห็นภาพชัด</h2>
<table>
<thead>
<tr>
<th>สิ่งที่เห็น</th>
<th>จริง ๆ คืออะไร</th>
<th>ตัวอย่างงาน</th>
</tr>
</thead>
<tbody>
<tr>
<td>ChatGPT, Claude, Gemini</td>
<td>ผู้ช่วยสนทนาที่ขับเคลื่อนด้วย LLM</td>
<td>ถามตอบ, สรุป, เขียน SQL</td>
</tr>
<tr>
<td>Llama, GPT, Qwen</td>
<td>ตระกูลของ LLM</td>
<td>generate text, classify, extract</td>
</tr>
<tr>
<td>Midjourney, DALL-E</td>
<td>Generative AI สำหรับภาพ</td>
<td>สร้างรูปจากข้อความ</td>
</tr>
<tr>
<td>Suno</td>
<td>Generative AI สำหรับเสียง/เพลง</td>
<td>สร้าง audio</td>
</tr>
</tbody>
</table>
<h3 id="%E0%B8%9A%E0%B8%A3%E0%B8%B4%E0%B8%9A%E0%B8%97%E0%B8%82%E0%B8%AD%E0%B8%87%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89">บริบทของคาบนี้</h3>
<ul>
<li>เราจะโฟกัส <strong>text-based Generative AI</strong></li>
<li>หรือพูดให้ตรงขึ้นคือ <strong>การใช้ LLM กับงานข้อมูล</strong></li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="8" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="llm-%E0%B8%8A%E0%B9%88%E0%B8%A7%E0%B8%A2%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%82%E0%B9%89%E0%B8%AD%E0%B8%A1%E0%B8%B9%E0%B8%A5%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3%E0%B9%84%E0%B8%94%E0%B9%89%E0%B8%9A%E0%B9%89%E0%B8%B2%E0%B8%87">LLM ช่วยงานข้อมูลอะไรได้บ้าง</h2>
<h3 id="%E0%B9%83%E0%B8%99-workflow-%E0%B8%88%E0%B8%A3%E0%B8%B4%E0%B8%87">ใน workflow จริง</h3>
<ul>
<li>แปลงคำถามธุรกิจเป็น <strong>SQL</strong></li>
<li>ช่วยอ่านผล <strong>EDA</strong> และตั้ง hypothesis</li>
<li>ดึงข้อมูลจากข้อความด้วย <strong>extraction</strong></li>
<li>ตรวจความผิดปกติและช่วย reasoning เบื้องต้น</li>
<li>สรุปผลเชิงเทคนิคให้เป็นภาษาที่สื่อสารกับทีมได้</li>
</ul>
<blockquote>
<p>คำถามหลักของคาบ: ใช้ AI ตรงไหนแล้วคุ้ม แต่ยังควบคุมคุณภาพได้?</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="9" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%A8%E0%B8%B1%E0%B8%9E%E0%B8%97%E0%B9%8C%E0%B8%AA%E0%B8%B3%E0%B8%84%E0%B8%B1%E0%B8%8D%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%A3%E0%B8%B9%E0%B9%89%E0%B8%81%E0%B9%88%E0%B8%AD%E0%B8%99%E0%B9%80%E0%B8%A3%E0%B8%B4%E0%B9%88%E0%B8%A1">ศัพท์สำคัญที่ต้องรู้ก่อนเริ่ม</h2>
<h3 id="%E0%B8%84%E0%B8%B3%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%80%E0%B8%88%E0%B8%AD%E0%B8%9A%E0%B9%88%E0%B8%AD%E0%B8%A2%E0%B9%83%E0%B8%99%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89">คำที่เจอบ่อยในคาบนี้</h3>
<ul>
<li><strong>Prompt</strong>: ข้อความคำสั่งที่เราใช้สื่อสารกับโมเดล</li>
<li><strong>Context</strong>: ข้อมูลประกอบที่ใส่เพิ่มให้โมเดลตอบดีขึ้น</li>
<li><strong>Hallucination</strong>: โมเดลตอบอย่างมั่นใจ แต่ข้อเท็จจริงผิด</li>
<li><strong>Human verification</strong>: มนุษย์เป็นผู้ตรวจคำตอบก่อนนำไปใช้จริง</li>
<li><strong>Workflow</strong>: ลำดับขั้นของงานตั้งแต่รับข้อมูลจนสื่อสารผล</li>
</ul>
<h3 id="%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%88%E0%B8%B3%E0%B8%87%E0%B9%88%E0%B8%B2%E0%B8%A2">หลักจำง่าย</h3>
<ul>
<li>prompt ที่ดี + context ที่พอ + การตรวจโดยคน = ใช้งานได้จริงมากขึ้น</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="10" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%84%E0%B8%B4%E0%B8%94%E0%B8%81%E0%B9%88%E0%B8%AD%E0%B8%99%E0%B9%83%E0%B8%8A%E0%B9%89-llm">หลักคิดก่อนใช้ LLM</h2>
<h3 id="ai-%E0%B9%80%E0%B8%9B%E0%B9%87%E0%B8%99%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B8%8A%E0%B9%88%E0%B8%A7%E0%B8%A2-%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B9%83%E0%B8%8A%E0%B9%88%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B8%95%E0%B8%B1%E0%B8%94%E0%B8%AA%E0%B8%B4%E0%B8%99%E0%B8%AA%E0%B8%B8%E0%B8%94%E0%B8%97%E0%B9%89%E0%B8%B2%E0%B8%A2">AI เป็นผู้ช่วย ไม่ใช่ผู้ตัดสินสุดท้าย</h3>
<ul>
<li>LLM เก่งเรื่อง pattern ของภาษา ไม่ได้ &quot;รู้จริง&quot; ทุกเรื่อง</li>
<li>คำตอบที่ลื่นไหลอาจยัง <strong>ผิดเชิงข้อเท็จจริง</strong> ได้</li>
<li>งาน data ต้องมี <strong>human verification</strong> เสมอ</li>
<li>ยิ่ง prompt ชัด ยิ่งลดความคลุมเครือของ output</li>
</ul>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%95%E0%B8%A3%E0%B8%A7%E0%B8%88%E0%B8%97%E0%B8%B8%E0%B8%81%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B9%89%E0%B8%87">สิ่งที่ต้องตรวจทุกครั้ง</h3>
<ul>
<li>logic ถูกไหม</li>
<li>data leakage หรือไม่</li>
<li>ตัวเลขและ assumptions สอดคล้องโจทย์หรือไม่</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="11" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="hallucination-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Hallucination คืออะไร</h2>
<h3 id="%E0%B8%AD%E0%B8%B2%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%80%E0%B8%88%E0%B8%AD%E0%B9%84%E0%B8%94%E0%B9%89%E0%B8%9A%E0%B9%88%E0%B8%AD%E0%B8%A2">อาการที่เจอได้บ่อย</h3>
<ul>
<li>อ้างชื่อคอลัมน์ที่ไม่มีอยู่จริง</li>
<li>เขียน SQL ที่ syntax ดูเหมือนถูก แต่รันไม่ได้</li>
<li>สรุป insight ที่ไม่ได้รองรับจากข้อมูล</li>
<li>อ้างเหตุผลเชิงธุรกิจเกินกว่าสิ่งที่ข้อมูลบอกได้</li>
</ul>
<h3 id="%E0%B8%A7%E0%B8%B4%E0%B8%98%E0%B8%B5%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A1%E0%B8%B7%E0%B8%AD">วิธีรับมือ</h3>
<ul>
<li>ให้ schema หรือข้อมูลต้นทางชัดเจน</li>
<li>ขอให้โมเดลระบุ assumptions</li>
<li>ตรวจผลด้วย code, query, หรือ domain knowledge จริง</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="12" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="13" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B9%83%E0%B8%99%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89-%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3%E0%B8%84%E0%B8%B7%E0%B8%AD-generative-ai">ตัวอย่างงานในคาบนี้: อะไรคือ Generative AI</h2>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%80%E0%B8%A3%E0%B8%B2%E0%B8%88%E0%B8%B0%E0%B9%80%E0%B8%AB%E0%B9%87%E0%B8%99%E0%B8%88%E0%B8%A3%E0%B8%B4%E0%B8%87">ตัวอย่างที่เราจะเห็นจริง</h3>
<ul>
<li>ให้ LLM <strong>สร้าง SQL</strong> จากคำถามธุรกิจ</li>
<li>ให้ LLM <strong>สรุป EDA</strong> จาก <code>describe()</code> และ missing values</li>
<li>ให้ LLM <strong>extract sentiment และ entities</strong> จาก feedback</li>
<li>ให้ LLM <strong>ร่าง summary ภาษา business</strong> จากผลวิเคราะห์</li>
</ul>
<h3 id="%E0%B8%88%E0%B8%B8%E0%B8%94%E0%B8%A3%E0%B9%88%E0%B8%A7%E0%B8%A1%E0%B8%82%E0%B8%AD%E0%B8%87%E0%B8%97%E0%B8%B8%E0%B8%81%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87">จุดร่วมของทุกตัวอย่าง</h3>
<ul>
<li>โมเดลรับ input เป็นข้อความหรือข้อมูลที่แปลงเป็นข้อความ</li>
<li>โมเดลสร้าง output ใหม่ในรูปที่มนุษย์นำไปใช้ต่อได้</li>
<li>แต่ผลลัพธ์ยังต้องผ่านการตรวจโดยผู้วิเคราะห์เสมอ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-class="divider" data-theme="mahidol" lang="C" class="divider" data-marpit-pagination="14" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--class:divider;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="01">01</h2>
<h2 id="sql-and-eda">SQL and EDA</h2>
<p>From Business Question to First Insight</p>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="15" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="demo-1-llm-%E0%B8%AA%E0%B8%A3%E0%B9%89%E0%B8%B2%E0%B8%87-sql">Demo 1: LLM สร้าง SQL</h2>
<h3 id="%E0%B9%82%E0%B8%88%E0%B8%97%E0%B8%A2%E0%B9%8C%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87">โจทย์ตัวอย่าง</h3>
<blockquote>
<p>&quot;ลูกค้ากลุ่มไหนมี churn สูงสุด เมื่อดูแยกตาม contract type?&quot;</p>
</blockquote>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B9%83%E0%B8%AB%E0%B9%89-llm">สิ่งที่ต้องให้ LLM</h3>
<ul>
<li>schema ของตาราง</li>
<li>ความหมายของแต่ละ field</li>
<li>output ที่ต้องการ</li>
<li>ข้อจำกัด เช่น ใช้ SQL dialect แบบใด</li>
</ul>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B9%80%E0%B8%AB%E0%B9%87%E0%B8%99">สิ่งที่ผู้เรียนควรเห็น</h3>
<ul>
<li>LLM ช่วยร่าง query ได้เร็ว</li>
<li>แต่เราต้องตรวจ join, filter, aggregation เอง</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="16" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%84%E0%B8%B3%E0%B8%A7%E0%B9%88%E0%B8%B2-schema-%E0%B9%81%E0%B8%A5%E0%B8%B0-sql-dialect-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">คำว่า Schema และ SQL Dialect คืออะไร</h2>
<h3 id="schema">Schema</h3>
<ul>
<li>คือโครงสร้างของข้อมูลในตาราง</li>
<li>บอกว่าแต่ละตารางมีคอลัมน์อะไร ชนิดข้อมูลอะไร และเชื่อมกันอย่างไร</li>
</ul>
<h3 id="sql-dialect">SQL Dialect</h3>
<ul>
<li>คือรูปแบบย่อยของ SQL ที่แต่ละระบบใช้ไม่เหมือนกันเล็กน้อย</li>
<li>ตัวอย่าง: PostgreSQL, MySQL, BigQuery, SQL Server</li>
</ul>
<h3 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%9A%E0%B8%AD%E0%B8%81-llm">ทำไมต้องบอก LLM</h3>
<ul>
<li>ถ้าไม่บอก schema อาจเดาชื่อคอลัมน์ผิด</li>
<li>ถ้าไม่บอก dialect อาจใช้ syntax ผิดระบบ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="17" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="prompt-pattern-%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A-sql">Prompt Pattern สำหรับ SQL</h2>
<pre><code class="language-text">You are a data analyst.
Given the schema below, write SQL to answer the business question.
Explain assumptions briefly.
Return SQL first, then a short explanation.
</code></pre>
<h3 id="%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%84%E0%B8%B4%E0%B8%94">หลักคิด</h3>
<ul>
<li>ระบุ role ให้ชัด</li>
<li>ให้ schema ครบเท่าที่จำเป็น</li>
<li>บอก output format ล่วงหน้า</li>
<li>ขอ assumptions เพื่อช่วยจับจุดเสี่ยง</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="18" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="demo-2-llm-%E0%B8%8A%E0%B9%88%E0%B8%A7%E0%B8%A2-eda">Demo 2: LLM ช่วย EDA</h2>
<h3 id="%E0%B8%AD%E0%B8%B4%E0%B8%99%E0%B8%9E%E0%B8%B8%E0%B8%95%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%9B%E0%B9%89%E0%B8%AD%E0%B8%99%E0%B9%83%E0%B8%AB%E0%B9%89-llm-%E0%B9%84%E0%B8%94%E0%B9%89">อินพุตที่ป้อนให้ LLM ได้</h3>
<ul>
<li><code>head()</code> เพื่อดูตัวอย่างข้อมูล</li>
<li><code>info()</code> เพื่อดูชนิดข้อมูล</li>
<li><code>describe()</code> เพื่อดูสถิติพื้นฐาน</li>
<li>missing value summary</li>
<li>class distribution หรือ target distribution</li>
</ul>
<h3 id="%E0%B8%9C%E0%B8%A5%E0%B8%A5%E0%B8%B1%E0%B8%9E%E0%B8%98%E0%B9%8C%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%84%E0%B8%B2%E0%B8%94%E0%B8%AB%E0%B8%A7%E0%B8%B1%E0%B8%87">ผลลัพธ์ที่คาดหวัง</h3>
<ul>
<li>สรุป insight เบื้องต้น</li>
<li>ตั้ง hypothesis ที่ควรตรวจต่อ</li>
<li>ชี้ feature ที่น่าสนใจ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="19" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B9%83%E0%B8%99%E0%B8%87%E0%B8%B2%E0%B8%99-eda-%E0%B8%84%E0%B8%B3%E0%B8%A7%E0%B9%88%E0%B8%B2-hypothesis-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">ในงาน EDA คำว่า Hypothesis คืออะไร</h2>
<h3 id="%E0%B8%84%E0%B8%A7%E0%B8%B2%E0%B8%A1%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%A2%E0%B9%83%E0%B8%99%E0%B8%9A%E0%B8%A3%E0%B8%B4%E0%B8%9A%E0%B8%97%E0%B8%99%E0%B8%B5%E0%B9%89">ความหมายในบริบทนี้</h3>
<ul>
<li>เป็น &quot;ข้อคาดเดาที่ตรวจต่อได้&quot; ไม่ใช่ข้อสรุปสุดท้าย</li>
<li>ใช้เพื่อบอกว่าควรสำรวจอะไรเพิ่มจาก pattern ที่เห็น</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87">ตัวอย่าง</h3>
<ul>
<li>&quot;ลูกค้าที่ tenure ต่ำอาจ churn สูงกว่า&quot;</li>
<li>&quot;ลูกค้าที่ใช้ monthly contract อาจเสี่ยง churn มากกว่า annual contract&quot;</li>
<li>&quot;คอลัมน์ TotalCharges อาจสัมพันธ์กับ tenure มากกว่า churn โดยตรง&quot;</li>
</ul>
<blockquote>
<p>หน้าที่ของ EDA คือสร้าง hypothesis เพื่อทดสอบต่อ ไม่ใช่รีบฟันธง</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="20" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="eda-%E0%B9%83%E0%B8%AB%E0%B9%89-llm-%E0%B8%8A%E0%B9%88%E0%B8%A7%E0%B8%A2%E0%B8%95%E0%B8%A3%E0%B8%87%E0%B9%84%E0%B8%AB%E0%B8%99">EDA: ให้ LLM ช่วยตรงไหน</h2>
<h3 id="%E0%B9%80%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%B0%E0%B8%A1%E0%B8%B2%E0%B8%81">เหมาะมาก</h3>
<ul>
<li>ช่วยสรุปสิ่งที่เห็นจากตารางสถิติ</li>
<li>ช่วยตั้งคำถามต่อจาก pattern ที่พบ</li>
<li>ช่วยร่าง checklist การทำ preprocessing</li>
</ul>
<h3 id="%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%A3%E0%B8%B0%E0%B8%A7%E0%B8%B1%E0%B8%87">ต้องระวัง</h3>
<ul>
<li>อย่าให้ LLM สรุปเกินข้อมูลที่มี</li>
<li>อย่าเชื่อความสัมพันธ์ว่าเป็นเหตุผลเชิงสาเหตุทันที</li>
<li>ต้องกลับไปดู data และ visualization จริงเสมอ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-class="divider" data-theme="mahidol" lang="C" class="divider" data-marpit-pagination="21" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--class:divider;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="02">02</h2>
<h2 id="mini-theory">Mini Theory</h2>
<p>Mental Models for the Afternoon</p>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="22" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="llm-token-context">LLM, Token, Context</h2>
<h3 id="%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B8%87%E0%B9%88%E0%B8%B2%E0%B8%A2%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%AA%E0%B8%B8%E0%B8%94">ภาพง่ายที่สุด</h3>
<ul>
<li><strong>LLM</strong> คือโมเดลที่ทำนายลำดับถัดไปของข้อความ</li>
<li><strong>Token</strong> คือหน่วยย่อยของข้อความที่โมเดลอ่าน</li>
<li><strong>Context window</strong> คือปริมาณข้อมูลที่โมเดลพิจารณาได้ในหนึ่งครั้ง</li>
<li><strong>Prompt</strong> คือวิธีตั้งโจทย์ให้โมเดลตอบในรูปแบบที่ต้องการ</li>
</ul>
<h3 id="%E0%B8%82%E0%B9%89%E0%B8%AD%E0%B8%AA%E0%B8%A3%E0%B8%B8%E0%B8%9B%E0%B9%80%E0%B8%8A%E0%B8%B4%E0%B8%87%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B8%87%E0%B8%B2%E0%B8%99">ข้อสรุปเชิงใช้งาน</h3>
<ul>
<li>ถ้าใส่บริบทไม่พอ คำตอบจะหลวม</li>
<li>ถ้าใส่บริบทมากแต่ไม่เป็นระบบ คำตอบจะสับสน</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%81%E0%B8%AD%E0%B8%9A">ตัวอย่างประกอบ</h3>
<ul>
<li>Prompt กว้าง: &quot;ช่วยวิเคราะห์ข้อมูลนี้&quot;</li>
<li>Prompt ชัด: &quot;จาก summary table นี้ ช่วยสรุป 3 insight, 2 risk, และ 2 ขั้นตอนถัดไป&quot;</li>
<li>ยิ่งกำหนดขอบเขตชัด LLM ยิ่งตอบได้ตรงงาน</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="23" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="prompt-%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%94%E0%B8%B5%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B8%A1%E0%B8%B5%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3%E0%B8%9A%E0%B9%89%E0%B8%B2%E0%B8%87">Prompt ที่ดีควรมีอะไรบ้าง</h2>
<h3 id="%E0%B9%82%E0%B8%84%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%B7%E0%B9%89%E0%B8%99%E0%B8%90%E0%B8%B2%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%84%E0%B8%94%E0%B9%89%E0%B8%9A%E0%B9%88%E0%B8%AD%E0%B8%A2">โครงพื้นฐานที่ใช้ได้บ่อย</h3>
<ol>
<li><strong>Role</strong>: ให้โมเดลรับบทอะไร</li>
<li><strong>Task</strong>: ให้ทำงานอะไร</li>
<li><strong>Context</strong>: มีข้อมูลอะไรให้ใช้</li>
<li><strong>Constraint</strong>: ห้ามหรือควรระวังอะไร</li>
<li><strong>Output format</strong>: อยากได้คำตอบในรูปแบบไหน</li>
</ol>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%A2%E0%B9%88%E0%B8%AD">ตัวอย่างย่อ</h3>
<blockquote>
<p>You are a data analyst. Given this table summary, list 3 insights and 2 data quality risks. Return bullet points only.</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="24" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="llm-%E0%B8%97%E0%B8%B3%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%95%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%88%E0%B8%B2%E0%B8%81-machine-learning-%E0%B8%97%E0%B8%B1%E0%B9%88%E0%B8%A7%E0%B9%84%E0%B8%9B%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B9%84%E0%B8%A3">LLM ทำงานต่างจาก Machine Learning ทั่วไปอย่างไร</h2>
<h3 id="ml-%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B9%80%E0%B8%94%E0%B8%B4%E0%B8%A1">ML แบบเดิม</h3>
<ul>
<li>มักออกแบบมาเพื่อ task เฉพาะ เช่น classification, regression</li>
<li>input และ output ค่อนข้างตายตัว</li>
<li>ต้อง train หรือ fine-tune ตามโจทย์ชัดเจน</li>
</ul>
<h3 id="llm">LLM</h3>
<ul>
<li>ใช้ภาษาเป็น interface กลาง</li>
<li>โมเดลเดียวทำได้หลายงานผ่าน prompt</li>
<li>เหมาะกับงานที่ต้องตีความ สรุป แปลง หรือร่างคำตอบ</li>
</ul>
<blockquote>
<p>ดังนั้นในคาบนี้ เราไม่ได้ใช้ LLM มาแทน model ทำนายทุกอย่าง แต่ใช้เป็นผู้ช่วยรอบ ๆ งานวิเคราะห์ข้อมูล</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="25" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="embeddings-%E0%B9%81%E0%B8%A5%E0%B8%B0-similarity-search">Embeddings และ Similarity Search</h2>
<h3 id="%E0%B9%81%E0%B8%99%E0%B8%A7%E0%B8%84%E0%B8%B4%E0%B8%94%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81">แนวคิดหลัก</h3>
<ul>
<li>embeddings คือการแทนข้อความเป็นเวกเตอร์ตัวเลข</li>
<li>ข้อความที่มีความหมายใกล้กันจะอยู่ใกล้กันใน vector space</li>
<li>เราใช้สิ่งนี้เพื่อค้นหาเนื้อหาที่เกี่ยวข้องก่อนส่งให้ LLM</li>
</ul>
<h3 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1%E0%B8%AA%E0%B8%B3%E0%B8%84%E0%B8%B1%E0%B8%8D">ทำไมสำคัญ</h3>
<ul>
<li>ช่วยให้ chatbot ตอบจากเอกสารของเราได้</li>
<li>เป็นพื้นฐานของ <strong>RAG</strong> และ <strong>vector database</strong></li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="26" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-embeddings-%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B8%84%E0%B8%93%E0%B8%B4%E0%B8%95">ตัวอย่าง Embeddings แบบไม่ต้องใช้คณิต</h2>
<h3 id="%E0%B8%A5%E0%B8%AD%E0%B8%87%E0%B8%99%E0%B8%B6%E0%B8%81%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B8%84%E0%B8%B3-3-%E0%B8%84%E0%B8%B3%E0%B8%99%E0%B8%B5%E0%B9%89">ลองนึกภาพคำ 3 คำนี้</h3>
<ul>
<li>&quot;ลูกค้ายกเลิกบริการ&quot;</li>
<li>&quot;customer churn&quot;</li>
<li>&quot;สูตรอาหารผัดกะเพรา&quot;</li>
</ul>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88-embeddings-%E0%B8%97%E0%B8%B3">สิ่งที่ embeddings ทำ</h3>
<ul>
<li>ประโยค 1 และ 2 จะถูกแทนเป็นเวกเตอร์ที่อยู่ใกล้กันกว่า</li>
<li>ประโยค 3 จะอยู่ไกลกว่า เพราะความหมายคนละเรื่อง</li>
</ul>
<h3 id="%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%82%E0%B8%A2%E0%B8%8A%E0%B8%99%E0%B9%8C">ประโยชน์</h3>
<ul>
<li>เวลา query เรื่อง churn ระบบจึงดึงเอกสารที่เกี่ยวข้องได้แม้ไม่ได้ใช้คำเหมือนกันทุกตัว</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-class="divider" data-theme="mahidol" lang="C" class="divider" data-marpit-pagination="27" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--class:divider;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="03">03</h2>
<h2 id="groq-workflow">Groq Workflow</h2>
<p>One Prompt, Many Data Tasks</p>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="28" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="chat-with-llm-groq">Chat with LLM (Groq)</h2>
<h3 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%AA%E0%B8%B2%E0%B8%98%E0%B8%B4%E0%B8%95%E0%B8%AD%E0%B8%B5%E0%B8%81-platform">ทำไมต้องสาธิตอีก platform</h3>
<ul>
<li>ให้เห็นว่า LLM ไม่ได้มีแค่หน้า chat แบบเดียว</li>
<li>เห็นแนวคิดของการเรียก model ใน workflow จริง</li>
<li>เปรียบเทียบความเร็วและรูปแบบการใช้งาน</li>
</ul>
<h3 id="%E0%B8%84%E0%B8%B3%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B9%81%E0%B8%A2%E0%B8%81%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B8%AD%E0%B8%AD%E0%B8%81">คำที่ต้องแยกให้ออก</h3>
<ul>
<li><strong>Groq</strong> ในคาบนี้คือ platform/runtime สำหรับเรียกโมเดล</li>
<li>ไม่ใช่ชื่อเรียกรวมของ LLM ทุกตัว</li>
<li>บน platform เดียวกันอาจเลือกใช้คนละ model ได้</li>
</ul>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B9%80%E0%B8%82%E0%B9%89%E0%B8%B2%E0%B9%83%E0%B8%88">สิ่งที่ต้องการให้ผู้เรียนเข้าใจ</h3>
<ul>
<li>model เป็นเพียง engine</li>
<li>คุณภาพผลลัพธ์ขึ้นกับ prompt และบริบทมากพอ ๆ กัน</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="29" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="data-extraction-with-llm">Data Extraction with LLM</h2>
<h3 id="%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%80%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%B0%E0%B8%81%E0%B8%B1%E0%B8%9A%E0%B8%82%E0%B9%89%E0%B8%AD%E0%B8%84%E0%B8%A7%E0%B8%B2%E0%B8%A1%E0%B8%88%E0%B8%B3%E0%B8%99%E0%B8%A7%E0%B8%99%E0%B8%A1%E0%B8%B2%E0%B8%81">งานที่เหมาะกับข้อความจำนวนมาก</h3>
<ul>
<li><strong>Sentiment analysis</strong>: positive, neutral, negative</li>
<li><strong>Entity recognition</strong>: คน, องค์กร, สถานที่, สินค้า</li>
<li>แปลง free text ให้เป็น structured output</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-use-case">ตัวอย่าง use case</h3>
<ul>
<li>วิเคราะห์ feedback ของลูกค้า</li>
<li>อ่าน ticket support แล้ว tag ประเภทปัญหา</li>
<li>สกัดประเด็นสำคัญจากรีวิวจำนวนมาก</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="30" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="sentiment-%E0%B9%81%E0%B8%A5%E0%B8%B0-entity-recognition-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Sentiment และ Entity Recognition คืออะไร</h2>
<h3 id="sentiment-analysis">Sentiment analysis</h3>
<ul>
<li>ดูว่าอารมณ์หรือท่าทีของข้อความเป็นบวก ลบ หรือกลาง</li>
<li>ตัวอย่าง: &quot;แอปช้ามากและจ่ายเงินไม่ผ่าน&quot; -&gt; negative</li>
</ul>
<h3 id="entity-recognition">Entity recognition</h3>
<ul>
<li>ดึงสิ่งสำคัญที่เป็นชื่อเฉพาะหรือหมวดสำคัญออกมา</li>
<li>ตัวอย่าง: จากข้อความเดียวกัน อาจได้ <code>mobile app</code>, <code>payment</code></li>
</ul>
<h3 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1-useful">ทำไม useful</h3>
<ul>
<li>เปลี่ยน feedback ที่อ่านยากให้เป็นตารางที่นับและวิเคราะห์ต่อได้</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="31" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="extraction-%E0%B8%A3%E0%B8%B9%E0%B8%9B%E0%B9%81%E0%B8%9A%E0%B8%9A-output-%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%94%E0%B8%B5">Extraction: รูปแบบ output ที่ดี</h2>
<h3 id="%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B8%95%E0%B8%AD%E0%B8%9A%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B8%A5%E0%B8%AD%E0%B8%A2-%E0%B9%86">อย่าให้ตอบแบบลอย ๆ</h3>
<p>ควรขอ output ที่ชัด เช่น</p>
<pre><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;sentiment&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;negative&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;entities&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;billing&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;mobile app&quot;</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;urgency&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;high&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<h3 id="%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%84%E0%B8%B4%E0%B8%94-1">หลักคิด</h3>
<ul>
<li>ยิ่งกำหนด schema ชัด ยิ่งเอาไปใช้ต่อได้ง่าย</li>
<li>structured output ลดภาระการแปลงผลภายหลัง</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="32" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="data-validation-with-llm">Data Validation with LLM</h2>
<h3 id="%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%AA%E0%B8%B2%E0%B8%98%E0%B8%B4%E0%B8%95">งานที่สาธิต</h3>
<ul>
<li><strong>Anomaly detection</strong> ใน record ที่ดูผิดปกติ</li>
<li><strong>Causality analysis</strong> ในความหมายของการตั้งคำถามเชิงเหตุผลเบื้องต้น</li>
</ul>
<h3 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B8%A2%E0%B9%89%E0%B8%B3">สิ่งที่ต้องย้ำ</h3>
<ul>
<li>LLM ไม่ได้พิสูจน์ causality ให้เรา</li>
<li>แต่ช่วยตั้งข้อสังเกตและรายการคำถามที่ควรตรวจต่อได้</li>
<li>ต้องกลับไปตรวจด้วย data, experiment, หรือ domain knowledge</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="33" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="anomaly-%E0%B9%81%E0%B8%A5%E0%B8%B0-deterministic-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Anomaly และ Deterministic คืออะไร</h2>
<h3 id="anomaly">Anomaly</h3>
<ul>
<li>คือข้อมูลที่ดูผิดปกติจาก pattern ทั่วไป</li>
<li>ตัวอย่าง: อายุเป็น 250 ปี, ยอดใช้จ่ายติดลบ, ลูกค้ารายเดียวมี churn ซ้ำหลายครั้ง</li>
</ul>
<h3 id="deterministic-rule">Deterministic rule</h3>
<ul>
<li>คือกฎที่ให้ผลแน่นอนเหมือนเดิมทุกครั้ง</li>
<li>ตัวอย่าง: <code>age &lt; 0</code> ถือว่าผิดแน่, <code>email</code> ต้องมี <code>@</code></li>
</ul>
<h3 id="%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B8%A3%E0%B9%88%E0%B8%A7%E0%B8%A1%E0%B8%81%E0%B8%B1%E0%B8%99">หลักใช้ร่วมกัน</h3>
<ul>
<li>กฎ deterministic ใช้จับ error ที่ชัดเจน</li>
<li>LLM ใช้ช่วยอธิบายหรือชี้ pattern แปลกที่กฎง่าย ๆ ยังจับไม่ครบ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="34" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="validation-%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B8%96%E0%B8%B9%E0%B8%81%E0%B8%9A%E0%B8%97%E0%B8%9A%E0%B8%B2%E0%B8%97">Validation: ใช้ให้ถูกบทบาท</h2>
<h3 id="llm-%E0%B8%8A%E0%B9%88%E0%B8%A7%E0%B8%A2%E0%B9%84%E0%B8%94%E0%B9%89%E0%B8%94%E0%B8%B5%E0%B9%80%E0%B8%A1%E0%B8%B7%E0%B9%88%E0%B8%AD">LLM ช่วยได้ดีเมื่อ</h3>
<ul>
<li>ต้องสรุปความผิดปกติจากหลาย field พร้อมกัน</li>
<li>ต้องร่าง hypothesis เร็ว ๆ ก่อนวิเคราะห์ต่อ</li>
<li>ต้องอธิบาย anomaly ให้คนในทีมเข้าใจง่าย</li>
</ul>
<h3 id="%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%81%E0%B8%97%E0%B8%99">ไม่ควรใช้แทน</h3>
<ul>
<li>statistical test</li>
<li>causal inference จริงจัง</li>
<li>rule-based validation ที่ต้อง deterministic</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="35" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="data-generation-with-llm">Data Generation with LLM</h2>
<h3 id="synthetic-data-%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%80%E0%B8%9E%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Synthetic Data ใช้เพื่ออะไร</h3>
<ul>
<li>ทดลอง pipeline ก่อนมีข้อมูลจริง</li>
<li>สร้างตัวอย่างสำหรับ demo หรือ prototype</li>
<li>จำลองข้อความหลายรูปแบบเพื่อทดสอบ extraction</li>
</ul>
<h3 id="%E0%B8%82%E0%B9%89%E0%B8%AD%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B8%A3%E0%B8%B0%E0%B8%A7%E0%B8%B1%E0%B8%87">ข้อควรระวัง</h3>
<ul>
<li>realism อาจไม่พอ</li>
<li>bias อาจถูกขยาย</li>
<li>ห้ามสับสนว่า synthetic data แทน production data ได้เสมอ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="36" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="synthetic-data-%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%80%E0%B8%A1%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B9%84%E0%B8%A3">Synthetic Data ควรใช้เมื่อไร</h2>
<h3 id="%E0%B9%80%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%B0%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%80%E0%B8%A1%E0%B8%B7%E0%B9%88%E0%B8%AD">เหมาะใช้เมื่อ</h3>
<ul>
<li>ต้องการ demo โดยไม่เปิดเผยข้อมูลจริง</li>
<li>ต้องการทดสอบว่า pipeline ทำงานครบหรือไม่</li>
<li>ต้องการสร้างข้อความหลายรูปแบบเพื่อเทส extraction</li>
</ul>
<h3 id="%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B9%81%E0%B8%97%E0%B8%99%E0%B8%97%E0%B8%B1%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%80%E0%B8%A1%E0%B8%B7%E0%B9%88%E0%B8%AD">ไม่ควรใช้แทนทันทีเมื่อ</h3>
<ul>
<li>ต้องวัด performance จริงของโมเดล</li>
<li>ต้องการ distribution ที่เหมือน production มาก ๆ</li>
<li>ใช้ตัดสินใจธุรกิจโดยตรง</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="37" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="data-summarization-with-llm">Data Summarization with LLM</h2>
<h3 id="%E0%B8%AA%E0%B8%AD%E0%B8%87%E0%B8%A3%E0%B8%B0%E0%B8%94%E0%B8%B1%E0%B8%9A%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B8%AA%E0%B8%B2%E0%B8%98%E0%B8%B4%E0%B8%95">สองระดับที่ควรสาธิต</h3>
<ul>
<li><strong>เชิงสถิติ</strong>: ค่าเฉลี่ย, trend, outlier, class imbalance</li>
<li><strong>เชิง narrative</strong>: แปลผลเป็นภาษาที่ผู้บริหารหรือ stakeholder เข้าใจ</li>
</ul>
<h3 id="%E0%B8%84%E0%B8%B8%E0%B8%93%E0%B8%84%E0%B9%88%E0%B8%B2%E0%B8%88%E0%B8%A3%E0%B8%B4%E0%B8%87">คุณค่าจริง</h3>
<ul>
<li>ลดเวลาการเขียนสรุป</li>
<li>ช่วยแปลง output เชิงเทคนิคเป็น business insight</li>
<li>ทำให้ทีมสื่อสารผล analysis ได้เร็วขึ้น</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-class="divider" data-theme="mahidol" lang="C" class="divider" data-marpit-pagination="38" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--class:divider;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="04">04</h2>
<h2 id="chatbot-and-rag">Chatbot and RAG</h2>
<p>From Single Prompt to System Design</p>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="39" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="chatbot-mini-demo">Chatbot Mini Demo</h2>
<h3 id="%E0%B9%80%E0%B8%9B%E0%B9%89%E0%B8%B2%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%A2%E0%B8%82%E0%B8%AD%E0%B8%87-demo-%E0%B8%99%E0%B8%B5%E0%B9%89">เป้าหมายของ demo นี้</h3>
<ul>
<li>ให้เห็นว่า chatbot คือการประกอบหลายชิ้นเข้าด้วยกัน</li>
<li>รับคำถาม -&gt; เลือกบริบท -&gt; เรียก model -&gt; ส่งคำตอบกลับ</li>
<li>ต่อจากงาน extraction และ summarization ได้ทันที</li>
</ul>
<h3 id="%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B9%87%E0%B8%99%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%84%E0%B8%A7%E0%B8%A3%E0%B8%96%E0%B8%B2%E0%B8%A1%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99">ประเด็นที่ควรถามผู้เรียน</h3>
<ul>
<li>ถ้าจะใช้ในองค์กร ต้องตอบจากความรู้ไหน?</li>
<li>ถ้าคำตอบผิด ใครเป็นคนตรวจ?</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="40" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="chatbot-llm-%E0%B9%81%E0%B8%A5%E0%B8%B0-rag-%E0%B8%95%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%81%E0%B8%B1%E0%B8%99%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B9%84%E0%B8%A3">Chatbot, LLM, และ RAG ต่างกันอย่างไร</h2>
<h3 id="llm-1">LLM</h3>
<ul>
<li>คือโมเดลภาษาที่สร้างคำตอบ</li>
</ul>
<h3 id="chatbot">Chatbot</h3>
<ul>
<li>คือแอปหรือ interface ที่ให้ผู้ใช้คุยกับระบบได้</li>
<li>อาจใช้ LLM อยู่ข้างใน หรือไม่ใช้ก็ได้</li>
</ul>
<h3 id="rag-chatbot">RAG chatbot</h3>
<ul>
<li>คือ chatbot ที่ใช้ LLM ร่วมกับการค้นข้อมูลจากเอกสารจริงก่อนตอบ</li>
</ul>
<blockquote>
<p>พูดง่าย ๆ: LLM คือ engine, chatbot คือหน้าตาใช้งาน, RAG คือวิธีเสริมความรู้ให้ตอบจากข้อมูลของเรา</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="41" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="rag-%E0%B8%84%E0%B8%B7%E0%B8%AD%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">RAG คืออะไร</h2>
<h3 id="retrieval-augmented-generation">Retrieval-Augmented Generation</h3>
<ol>
<li>รับคำถามจากผู้ใช้</li>
<li>ค้นเอกสารหรือข้อความที่เกี่ยวข้อง</li>
<li>ส่งบริบทนั้นเข้าไปพร้อม prompt</li>
<li>ให้ LLM สร้างคำตอบที่อิงข้อมูลที่ดึงมา</li>
</ol>
<h3 id="%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%82%E0%B8%A2%E0%B8%8A%E0%B8%99%E0%B9%8C-1">ประโยชน์</h3>
<ul>
<li>ลดการตอบจากความจำเดิมของโมเดลอย่างเดียว</li>
<li>เพิ่มความสามารถในการอ้างอิงข้อมูลเฉพาะองค์กร</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="42" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%84%E0%B8%B3%E0%B8%A7%E0%B9%88%E0%B8%B2-chunk-%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%A2%E0%B8%96%E0%B8%B6%E0%B8%87%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">คำว่า Chunk หมายถึงอะไร</h2>
<h3 id="%E0%B9%83%E0%B8%99%E0%B8%A3%E0%B8%B0%E0%B8%9A%E0%B8%9A-rag">ในระบบ RAG</h3>
<ul>
<li>เอกสารยาว ๆ มักถูกตัดเป็นชิ้นเล็ก ๆ เรียกว่า <strong>chunks</strong></li>
<li>แต่ละ chunk จะถูกแปลงเป็น embedding แล้วเก็บไว้ค้นภายหลัง</li>
</ul>
<h3 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1%E0%B8%95%E0%B9%89%E0%B8%AD%E0%B8%87%E0%B9%81%E0%B8%9A%E0%B9%88%E0%B8%87">ทำไมต้องแบ่ง</h3>
<ul>
<li>ถ้าส่งทั้งเอกสารยาวมากไปให้โมเดลทีเดียว จะเปลือง context window</li>
<li>การแบ่งช่วยค้นหาเฉพาะส่วนที่เกี่ยวข้องจริง</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-1">ตัวอย่าง</h3>
<ul>
<li>คู่มือ 20 หน้าอาจถูกแบ่งเป็น 100 chunks</li>
<li>เวลา user ถามเรื่อง &quot;refund policy&quot; ระบบจะดึงเฉพาะ chunks ที่เกี่ยวข้องกับ refund</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="43" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="vector-database-%E0%B8%97%E0%B8%B3%E0%B8%AB%E0%B8%99%E0%B9%89%E0%B8%B2%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3">Vector Database ทำหน้าที่อะไร</h2>
<h3 id="%E0%B9%81%E0%B8%99%E0%B8%A7%E0%B8%84%E0%B8%B4%E0%B8%94%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81-1">แนวคิดหลัก</h3>
<ul>
<li>เก็บ embeddings ของเอกสารหรือ chunks ของข้อความ</li>
<li>ค้นหาข้อความที่ใกล้เคียงกับ query ได้เร็ว</li>
<li>เป็น backend สำคัญของระบบ RAG</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B8%A3%E0%B8%A7%E0%B8%A1">ตัวอย่างภาพรวม</h3>
<p>Document -&gt; Chunk -&gt; Embed -&gt; Store -&gt; Retrieve -&gt; Generate</p>
<blockquote>
<p>ถ้า chatbot ต้องตอบจากเอกสารจริงขององค์กร เรามักต้องมี vector database</p>
</blockquote>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="44" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="workshop-prompt-ideas">Workshop Prompt Ideas</h2>
<h3 id="%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B9%81%E0%B8%95%E0%B9%88%E0%B8%A5%E0%B8%B0%E0%B8%81%E0%B8%A5%E0%B8%B8%E0%B9%88%E0%B8%A1%E0%B9%80%E0%B8%A5%E0%B8%B7%E0%B8%AD%E0%B8%81-1-%E0%B8%87%E0%B8%B2%E0%B8%99">ให้แต่ละกลุ่มเลือก 1 งาน</h3>
<ol>
<li>สร้าง SQL จาก business question</li>
<li>สรุป EDA จาก descriptive statistics</li>
<li>extract sentiment และ entities จาก feedback</li>
<li>ให้ LLM ช่วยอธิบาย anomaly ที่น่าสนใจ</li>
<li>สรุปผลวิเคราะห์ให้ผู้บริหารใน 5 บรรทัด</li>
</ol>
<h3 id="deliverable">Deliverable</h3>
<ul>
<li>prompt ที่ใช้</li>
<li>output ที่ได้</li>
<li>จุดที่ต้องตรวจโดยมนุษย์</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-theme="mahidol" lang="C" data-marpit-pagination="45" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--theme:mahidol;" data-marpit-pagination-total="46">
<h2 id="%E0%B8%AA%E0%B8%A3%E0%B8%B8%E0%B8%9B%E0%B8%A0%E0%B8%B2%E0%B8%84%E0%B8%9A%E0%B9%88%E0%B8%B2%E0%B8%A2">สรุปภาคบ่าย</h2>
<ul>
<li>LLM ช่วยเร่งงานข้อมูลได้หลายช่วงของ workflow</li>
<li>งานที่เห็นผลเร็วที่สุดคือ SQL, EDA, extraction, summarization</li>
<li>Prompt ที่ดีต้องระบุบริบท, output, และข้อจำกัดให้ชัด</li>
<li>งานที่เสี่ยงต่อความผิดพลาดต้องมี human verification เสมอ</li>
<li>Chatbot, RAG, และ vector database คือภาพต่อยอดเชิงระบบ</li>
</ul>
<footer>BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-footer="BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work" data-class="lead" data-theme="mahidol" lang="C" class="lead" data-marpit-pagination="46" style="--paginate:true;--footer:BDAT501 Data Science Fundamentals | Module 12-13 (Afternoon) | Generative AI for Data Work;--class:lead;--theme:mahidol;" data-marpit-pagination-total="46">
